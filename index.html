<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cape Canaveral Launch Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --bg-deep: #050a14;
    --bg-card: rgba(12, 22, 45, 0.7);
    --bg-card-hover: rgba(18, 32, 60, 0.85);
    --accent-burn: #ff5722;
    --accent-flame: #ff8a50;
    --accent-glow: #ffc947;
    --accent-cool: #26c6da;
    --accent-cool-dim: rgba(38, 198, 218, 0.15);
    --text-primary: #e8eaf0;
    --text-muted: #7a8ba8;
    --text-dim: #3d506b;
    --border-subtle: rgba(38, 198, 218, 0.12);
    --border-active: rgba(255, 87, 34, 0.4);
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── starfield canvas ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── layout ── */
  .page-wrap {
    position: relative; z-index: 1;
    max-width: 1060px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── header ── */
  header {
    text-align: center;
    padding: 3rem 0 1rem;
  }
  .site-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent-cool);
    opacity: 0.8;
    margin-bottom: 0.5rem;
  }
  .site-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, var(--accent-glow) 0%, var(--accent-burn) 50%, var(--accent-flame) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
  }
  .site-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 0.6rem;
    letter-spacing: 0.04em;
  }
  .site-sub span { color: var(--accent-cool); }

  /* ── hero countdown ── */
  .hero {
    margin: 2.5rem 0 3rem;
    padding: 2.5rem 2rem 2rem;
    background: var(--bg-card);
    border: 1px solid var(--border-active);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-burn), var(--accent-flame), var(--accent-glow), var(--accent-flame), var(--accent-burn), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .hero-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent-burn);
    margin-bottom: 0.4rem;
  }
  .hero-mission {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    color: var(--text-primary);
    margin-bottom: 0.25rem;
  }
  .hero-details {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .hero-details .tag {
    display: inline-block;
    background: var(--accent-cool-dim);
    color: var(--accent-cool);
    padding: 0.15em 0.55em;
    border-radius: 3px;
    font-size: 0.68rem;
    margin-right: 0.4rem;
    vertical-align: middle;
  }

  /* countdown digits */
  .countdown-row {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  .cd-unit {
    text-align: center;
    min-width: 80px;
  }
  .cd-val {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    line-height: 1;
    color: var(--text-primary);
    position: relative;
  }
  .cd-val::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-burn), transparent);
    opacity: 0.5;
  }
  .cd-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 0.6rem;
  }
  .cd-sep {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--accent-burn);
    align-self: flex-start;
    margin-top: 0.1em;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0.2; }
  }

  .hero-status {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .hero-status .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent-burn);
    border-radius: 50%;
    margin-right: 0.4rem;
    vertical-align: middle;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,87,34,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(255,87,34,0); }
  }

  /* past launch notice */
  .past-notice {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.85rem;
    color: var(--accent-glow);
  }

  /* ── section titles ── */
  .section-head {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.2rem;
  }
  .section-head h2 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-cool);
    white-space: nowrap;
  }
  .section-head::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-subtle), transparent);
  }

  /* ── launch list ── */
  .launch-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .launch-card {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 1rem;
    align-items: center;
    padding: 1rem 1.2rem;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    transition: all 0.25s ease;
    cursor: default;
  }
  .launch-card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(38,198,218,0.25);
    transform: translateX(3px);
  }
  .launch-card.is-next {
    border-color: var(--border-active);
    background: rgba(255,87,34,0.04);
  }

  .lc-date {
    text-align: center;
  }
  .lc-date .month {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-cool);
  }
  .lc-date .day {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--text-primary);
    line-height: 1.1;
  }
  .lc-date .time {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 0.1rem;
  }
  .lc-date .tbd {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text-dim);
    line-height: 1.1;
  }

  .lc-info {}
  .lc-mission {
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
  }
  .lc-desc {
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.45;
    max-width: 520px;
  }

  .lc-rocket {
    text-align: right;
    white-space: nowrap;
  }
  .lc-rocket .name {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-primary);
  }
  .lc-rocket .pad {
    font-size: 0.6rem;
    color: var(--text-dim);
    margin-top: 0.15rem;
  }
  .lc-rocket .provider {
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-cool);
    opacity: 0.7;
    margin-top: 0.3rem;
  }

  /* ── footer ── */
  footer {
    text-align: center;
    margin-top: 4rem;
    padding: 2rem 0;
    border-top: 1px solid var(--border-subtle);
    font-size: 0.65rem;
    color: var(--text-dim);
    line-height: 1.7;
  }
  footer a {
    color: var(--accent-cool);
    text-decoration: none;
    opacity: 0.7;
  }

  /* ── responsive ── */
  @media (max-width: 640px) {
    .launch-card {
      grid-template-columns: 70px 1fr;
      gap: 0.7rem;
    }
    .lc-rocket {
      grid-column: 1 / -1;
      text-align: left;
      padding-left: 70px;
      margin-top: -0.3rem;
    }
    .countdown-row { gap: 0.6rem; }
    .cd-unit { min-width: 60px; }
    .hero { padding: 1.8rem 1.2rem 1.5rem; }
  }
</style>
</head>
<body>

// ── Countdown logic ──
const now = () => new Date();

function getNextLaunch() {
  const current = now();
  for (const l of launches) {
    if (!l.tbd && l.date > current) return l;
  }
  // If all dated launches have passed, find first TBD
  return launches.find(l => l.tbd) || launches[launches.length - 1];
}

function timeDelta(target) {
  const diff = target - now();
  if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0, past: true };
  const s = Math.floor(diff / 1000) % 60;
  const m = Math.floor(diff / 60000) % 60;
  const h = Math.floor(diff / 3600000) % 24;
  const d = Math.floor(diff / 86400000);
  return { d, h, m, s, past: false };
}

function pad(n) { return String(n).padStart(2, '0'); }

function renderHero() {
  const next = getNextLaunch();
  const hero = document.getElementById('hero');

  if (next.tbd) {
    hero.innerHTML = `
      <div class="hero-label">NEXT CAPE CANAVERAL LAUNCH</div>
      <div class="hero-mission">${next.mission}</div>
      <div class="hero-details">
        <span class="tag">${next.rocket}</span>
        <span class="tag">${next.provider}</span>
        ${next.pad}
      </div>
      <div class="past-notice">Launch date TBD &mdash; check back for updates</div>
      <div class="hero-details" style="text-align:center">${next.desc}</div>
    `;
    return;
  }

  hero.innerHTML = `
    <div class="hero-label">NEXT CAPE CANAVERAL LAUNCH</div>
    <div class="hero-mission">${next.mission}</div>
    <div class="hero-details">
      <span class="tag">${next.rocket}</span>
      <span class="tag">${next.provider}</span>
      <span class="tag">${next.pad}</span>
      ${next.date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
      &bull; ${next.time}
    </div>
    <div class="countdown-row" id="cd-row">
      <div class="cd-unit"><div class="cd-val" id="cd-d">--</div><div class="cd-label">Days</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-val" id="cd-h">--</div><div class="cd-label">Hours</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-val" id="cd-m">--</div><div class="cd-label">Min</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-val" id="cd-s">--</div><div class="cd-label">Sec</div></div>
    </div>
    <div class="hero-status"><span class="live-dot"></span>T-minus counting &bull; ${next.desc}</div>
  `;

  function tick() {
    const t = timeDelta(next.date);
    if (t.past) {
      // Switch to next launch
      renderHero();
      renderList();
      return;
    }
    document.getElementById('cd-d').textContent = pad(t.d);
    document.getElementById('cd-h').textContent = pad(t.h);
    document.getElementById('cd-m').textContent = pad(t.m);
    document.getElementById('cd-s').textContent = pad(t.s);
  }
  tick();
  clearInterval(window._cdInterval);
  window._cdInterval = setInterval(tick, 1000);
}

function renderList() {
  const current = now();
  const container = document.getElementById('launch-list');
  const next = getNextLaunch();

  // Show future launches (skip ones already past if dated)
  const future = launches.filter(l => {
    if (!l.tbd) return l.date > current;
    return true;
  });

  container.innerHTML = future.map(l => {
    const isNext = l === next;
    const [monthStr, dayStr] = l.dateLabel.split(' ');
    return `
      <div class="launch-card${isNext ? ' is-next' : ''}">
        <div class="lc-date">
          <div class="month">${monthStr}</div>
          ${dayStr ? `<div class="day">${dayStr}</div>` : `<div class="tbd">${monthStr.length <= 3 ? 'NET' : ''}</div>`}
          ${l.time ? `<div class="time">${l.time}</div>` : `<div class="time">TBD</div>`}
        </div>
        <div class="lc-info">
          <div class="lc-mission">${l.mission}</div>
          <div class="lc-desc">${l.desc}</div>
        </div>
        <div class="lc-rocket">
          <div class="name">${l.rocket}</div>
          <div class="pad">${l.pad}</div>
          <div class="provider">${l.provider}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Starfield ──
(function initStars() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let w, h, stars = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function createStars(count) {
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random() * 0.6 + 0.15,
        speed: Math.random() * 0.0004 + 0.0001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      const flicker = 0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${s.a * flicker})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  createStars(280);
  window.addEventListener('resize', () => { resize(); createStars(280); });
  requestAnimationFrame(draw);
})();

// ── Init ──
renderHero();
renderList();
</script>
